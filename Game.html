<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulding Game project</title>
    <link rel="stylesheet" href="Game.css">
</head>

<body>
    <h1>Rock Paper Sucessor Game</h1>
    <div class="choices">
        <div class="choice" id="rock">
            <img src="./Project Images/rock.png" alt="Image1">
        </div>
        <div class="choice" id="scissors">
            <img src="./Project Images/scissors.png" alt="Image2">
        </div>
        <div class="choice" id="paper">
            <img src="./Project Images/paper.png" alt="Image3">
        </div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>User</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>comp</p>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">Play Your Store!</p>
    </div>
    <!-- <script src="script.js"></script> -->
    <script src="Game.js"></script>
</body>

</html>
